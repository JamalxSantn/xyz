<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayx Bypass</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            max-width: 450px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }
        h1 {
            color: #fff;
            font-size: 1.8em;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #ff4444;
            font-size: 0.85em;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 0, 0, 0.1);
        }
        .section-title {
            color: #ff0000;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 0, 0, 0.2);
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
        }
        .checkbox-label {
            color: #ccc;
            font-size: 0.9em;
        }
        .toggle {
            width: 44px;
            height: 24px;
            background: #333;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }
        .toggle.active {
            background: #ff0000;
        }
        .toggle::after {
            content: '';
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 3px;
            left: 3px;
            transition: 0.3s;
        }
        .toggle.active::after {
            left: 23px;
        }
        .slider-row {
            margin: 12px 0;
        }
        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .slider-label {
            color: #ccc;
            font-size: 0.85em;
        }
        .slider-value {
            color: #ff0000;
            font-weight: 600;
        }
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ff0000;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-load {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: white;
        }
        .btn-load:hover {
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            transform: translateY(-2px);
        }
        .btn-unload {
            background: #333;
            color: #888;
        }
        .btn-unload:hover {
            background: #444;
            color: #fff;
        }
        .status {
            text-align: center;
            margin-top: 15px;
            color: #666;
            font-size: 0.75em;
            min-height: 20px;
        }
        .status.success {
            color: #00ff00;
        }
        .status.error {
            color: #ff0000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">RX</div>
            <h1>Rayx Bypass</h1>
            <div class="subtitle">Cellular Cheat</div>
        </div>

        <div class="section">
            <div class="section-title">Aim Assist</div>
            
            <div class="checkbox-row">
                <span class="checkbox-label">Show FOV Circle</span>
                <div class="toggle" id="toggleShowFov" onclick="toggleApi('setShowFov', 'toggleShowFov')"></div>
            </div>
            
            <div class="checkbox-row">
                <span class="checkbox-label">Visible Check</span>
                <div class="toggle" id="toggleVisibleCheck" onclick="toggleApi('setVisibleCheck', 'toggleVisibleCheck')"></div>
            </div>
            
            <div class="slider-row">
                <div class="slider-header">
                    <span class="slider-label">FOV</span>
                    <span class="slider-value" id="fovValue">50</span>
                </div>
                <input type="range" min="0" max="180" value="50" id="fovSlider" oninput="updateSlider('fovValue', this.value); sendApi('setAimAssistFOV', this.value)">
            </div>
            
            <div class="slider-row">
                <div class="slider-header">
                    <span class="slider-label">Smooth</span>
                    <span class="slider-value" id="smoothValue">10</span>
                </div>
                <input type="range" min="0" max="100" value="10" id="smoothSlider" oninput="updateSlider('smoothValue', this.value); sendApi('setSmoothHorizontal', this.value)">
            </div>
            
            <div class="checkbox-row">
                <span class="checkbox-label">Silent Aim Visible Check</span>
                <div class="toggle" id="toggleVisibleCheck2" onclick="toggleApi('setVisibleCheck2', 'toggleVisibleCheck2')"></div>
            </div>
            
            <div class="slider-row">
                <div class="slider-header">
                    <span class="slider-label">Silent FOV</span>
                    <span class="slider-value" id="silentFovValue">50</span>
                </div>
                <input type="range" min="0" max="180" value="50" id="silentFovSlider" oninput="updateSlider('silentFovValue', this.value); sendApi('setSilentAimFOV', this.value)">
            </div>
        </div>

        <div class="section">
            <div class="section-title">Exploits</div>
            
            <div class="checkbox-row">
                <span class="checkbox-label">God Mode</span>
                <div class="toggle" id="toggleGod" onclick="toggleApi('setGod', 'toggleGod')"></div>
            </div>
            
            <div class="checkbox-row">
                <span class="checkbox-label">No Recoil</span>
                <div class="toggle" id="toggleRecoil" onclick="toggleApi('setRecoil', 'toggleRecoil')"></div>
            </div>
            
            <div class="checkbox-row">
                <span class="checkbox-label">No Spread</span>
                <div class="toggle" id="toggleSpread" onclick="toggleApi('setSpread', 'toggleSpread')"></div>
            </div>
            
            <div class="checkbox-row">
                <span class="checkbox-label">No Reload</span>
                <div class="toggle" id="toggleReload" onclick="toggleApi('setReload', 'toggleReload')"></div>
            </div>
            
            <div class="checkbox-row">
                <span class="checkbox-label">Stream Mode</span>
                <div class="toggle" id="toggleStream" onclick="toggleApi('setStream', 'toggleStream')"></div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">ESP</div>
            
            <div class="checkbox-row">
                <span class="checkbox-label">ESP Players</span>
                <div class="toggle" id="toggleESPPlayers" onclick="toggleApi('setESPPlayers', 'toggleESPPlayers')"></div>
            </div>
            
            <div class="checkbox-row">
                <span class="checkbox-label">ESP Vehicles</span>
                <div class="toggle" id="toggleESPVehicles" onclick="toggleApi('setESPVehicles', 'toggleESPVehicles')"></div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-load" onclick="sendApi('inject', '')">TP Waypoint</button>
            <button class="btn btn-unload" onclick="sendApi('cleaner', '')">Unload</button>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script>
        const CHEAT_URL = 'http://192.168.178.72:8080';

        function updateSlider(id, value) {
            document.getElementById(id).textContent = value;
        }

        function toggleApi(endpoint, toggleId) {
            const toggle = document.getElementById(toggleId);
            const isActive = toggle.classList.contains('active');
            const value = isActive ? 'false' : 'true';
            toggle.classList.toggle('active');
            sendApi(endpoint, value);
        }

        function sendApi(endpoint, value) {
            const url = value === '' ? `${CHEAT_URL}/${endpoint}` : `${CHEAT_URL}/${endpoint}?value=${value}`;
            fetch(url)
                .then(res => res.text())
                .then(data => {
                    console.log(data);
                })
                .catch(err => {
                    document.getElementById('status').textContent = 'Connection failed';
                    document.getElementById('status').className = 'status error';
                    setTimeout(() => {
                        document.getElementById('status').textContent = '';
                        document.getElementById('status').className = 'status';
                    }, 3000);
                });
        }
    </script>
</body>
</html>
